<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Wheeler Specs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            500: '#64748b',
                            400: '#94a3b8',
                            300: '#cbd5e1',
                            200: '#e2e8f0',
                            100: '#f1f5f9',
                            50: '#f8fafc',
                        },
                        amber: {
                            500: '#f59e0b',
                            600: '#d97706',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="bg-slate-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-amber-500">Two-Wheeler Specs</h1>
            <div class="flex items-center space-x-4">
                <input type="text" id="search" placeholder="Search by brand..." class="px-4 py-2 bg-slate-700 text-slate-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                <button id="addVehicle" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 transition">Add Vehicle</button>
                <button id="darkModeToggle" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 transition">Toggle Dark Mode</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div id="vehiclesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Vehicles will be loaded here -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-slate-800 p-6 rounded-lg max-w-md w-full mx-4">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-amber-500"></h2>
            <img id="modalImage" src="" alt="" class="w-full h-48 object-cover rounded-lg mb-4">
            <p id="modalDetails" class="text-slate-300"></p>
            <button id="closeModal" class="mt-4 px-4 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 transition">Close</button>
        </div>
    </div>

    <!-- Add Vehicle Modal -->
    <div id="addModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-slate-800 p-6 rounded-lg max-w-md w-full mx-4">
            <h2 class="text-xl font-bold mb-4 text-amber-500">Add New Vehicle</h2>
            <form id="addForm">
                <input type="text" id="modelName" placeholder="Model Name" required class="w-full p-2 mb-2 bg-slate-700 text-slate-100 rounded">
                <input type="text" id="brand" placeholder="Brand" required class="w-full p-2 mb-2 bg-slate-700 text-slate-100 rounded">
                <input type="number" id="engineCc" placeholder="Engine CC" required class="w-full p-2 mb-2 bg-slate-700 text-slate-100 rounded">
                <input type="text" id="maxPower" placeholder="Max Power" required class="w-full p-2 mb-2 bg-slate-700 text-slate-100 rounded">
                <input type="text" id="fuelType" placeholder="Fuel Type" required class="w-full p-2 mb-2 bg-slate-700 text-slate-100 rounded">
                <input type="url" id="imageUrl" placeholder="Image URL" required class="w-full p-2 mb-4 bg-slate-700 text-slate-100 rounded">
                <button type="submit" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 transition">Add Vehicle</button>
                <button type="button" id="closeAddModal" class="ml-2 px-4 py-2 bg-slate-600 text-slate-100 rounded-lg hover:bg-slate-500 transition">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const vehiclesGrid = document.getElementById('vehiclesGrid');
        const searchInput = document.getElementById('search');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalImage = document.getElementById('modalImage');
        const modalDetails = document.getElementById('modalDetails');
        const closeModal = document.getElementById('closeModal');
        const addVehicle = document.getElementById('addVehicle');
        const addModal = document.getElementById('addModal');
        const addForm = document.getElementById('addForm');
        const closeAddModal = document.getElementById('closeAddModal');
        const darkModeToggle = document.getElementById('darkModeToggle');

        let vehicles = [];

        // Fetch vehicles from API
        async function fetchVehicles() {
            try {
                const response = await fetch('/api/vehicles');
                vehicles = await response.json();
                displayVehicles(vehicles);
            } catch (error) {
                console.error('Error fetching vehicles:', error);
            }
        }

        // Display vehicles
        function displayVehicles(vehicleList) {
            vehiclesGrid.innerHTML = '';
            vehicleList.forEach(vehicle => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 p-4 rounded-lg shadow-lg hover:shadow-xl transition transform hover:scale-105';
                card.innerHTML = `
                    <img src="${vehicle.imageUrl}" alt="${vehicle.modelName}" class="w-full h-48 object-cover rounded-lg mb-4">
                    <h3 class="text-lg font-semibold text-amber-500">${vehicle.modelName}</h3>
                    <p class="text-slate-400">${vehicle.brand}</p>
                    <button class="mt-2 px-4 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 transition view-specs" data-id="${vehicle.id}">View Specs</button>
                `;
                vehiclesGrid.appendChild(card);
            });
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredVehicles = vehicles.filter(vehicle =>
                vehicle.brand.toLowerCase().includes(searchTerm)
            );
            displayVehicles(filteredVehicles);
        });

        // Modal functionality
        vehiclesGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('view-specs')) {
                const vehicleId = parseInt(e.target.dataset.id);
                const vehicle = vehicles.find(v => v.id === vehicleId);
                if (vehicle) {
                    modalTitle.textContent = vehicle.modelName;
                    modalImage.src = vehicle.imageUrl;
                    modalDetails.innerHTML = `
                        <strong>Brand:</strong> ${vehicle.brand}<br>
                        <strong>Engine CC:</strong> ${vehicle.engineCc}<br>
                        <strong>Max Power:</strong> ${vehicle.maxPower}<br>
                        <strong>Fuel Type:</strong> ${vehicle.fuelType}
                    `;
                    modal.classList.remove('hidden');
                }
            }
        });

        closeModal.addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        // Add vehicle modal
        addVehicle.addEventListener('click', () => {
            addModal.classList.remove('hidden');
        });

        closeAddModal.addEventListener('click', () => {
            addModal.classList.add('hidden');
        });

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newVehicle = {
                modelName: document.getElementById('modelName').value,
                brand: document.getElementById('brand').value,
                engineCc: parseInt(document.getElementById('engineCc').value),
                maxPower: document.getElementById('maxPower').value,
                fuelType: document.getElementById('fuelType').value,
                imageUrl: document.getElementById('imageUrl').value
            };
            try {
                const response = await fetch('/api/vehicles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newVehicle)
                });
                if (response.ok) {
                    addModal.classList.add('hidden');
                    addForm.reset();
                    fetchVehicles(); // Refresh the list
                } else {
                    alert('Error adding vehicle');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Dark mode toggle (already dark, but for completeness)
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        // Load vehicles on page load
        fetchVehicles();
    </script>
</body>
</html>
